name: Keep Backend Alive

# This workflow pings the Render backend every 10 minutes
# to prevent the free-tier service from sleeping.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping fast health endpoint
        run: curl -sf https://nexusedu-backend-0bjq.onrender.com/api/ping || true
