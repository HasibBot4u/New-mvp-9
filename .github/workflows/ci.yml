name: CI

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt || true
      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pytest-cov httpx pytest-mock
      - name: Run tests
        run: pytest backend/tests/ --cov=backend --cov-report=xml
      - uses: codecov/codecov-action@v3

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:ci || echo "No UI tests configured yet"
      - run: npm run test:e2e || echo "No E2E tests configured yet"

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bandit
      - run: bandit -r backend/ -f sarif -o bandit.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
      - run: npm audit --audit-level=high || true
