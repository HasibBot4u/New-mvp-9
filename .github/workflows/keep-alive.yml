name: Keep Backend Alive

# This workflow pings the Render backend every 10 minutes
# to prevent the free-tier service from sleeping and warms up cache.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping fast health endpoint
        run: |
          echo "Pinging /api/ping..."
          curl -s https://nexusedu-backend-0bjq.onrender.com/api/ping || echo "Ping failed"
          
      - name: Warmup API
        run: |
          echo "Warming up /api/warmup..."
          curl -s https://nexusedu-backend-0bjq.onrender.com/api/warmup || echo "Warmup failed"
